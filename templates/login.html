<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CFC</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>

<body>

    <!-- MAIN HEADING -->
    <h1 class="main-title">Carbon Footprint Calculator</h1>

    <div class="auth-container">
        <div class="card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Login to continue</p>

            {% if msg %}
            <div class="error">{{ msg }}</div>
            {% endif %}

            <form action="/login" method="POST">

                <div class="input-group">
                    <label>Username or Email</label>
                    <input type="text" name="identifier" placeholder="Enter username or email" required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter password" required>
                </div>

                <button class="btn green" type="submit">Login</button>
            </form>

            <p class="switch">Don't have an account?  
                <a href="/register">Register</a>
            </p>
        </div>
    </div>

</body>

</html>
